name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: bgfx backend build + test (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      # The shared SDL desktop gamepad source (labelle-sdl-gamepad) links SDL2.
      - name: Install SDL2
        run: brew install sdl2
      # zbgfx C/C++ is heavy; cache the global + project zig caches keyed on the zon.
      - name: Cache Zig artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            ~/Library/Caches/zig
            .zig-cache
          key: bgfx-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            bgfx-${{ runner.os }}-
      - name: Build + test
        run: zig build test
