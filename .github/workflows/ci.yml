name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: these jobs only read the repo (+ fetch public deps).
permissions:
  contents: read

jobs:
  build-test:
    name: bgfx backend build + test (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      # The shared SDL desktop gamepad source (labelle-sdl-gamepad) links SDL2.
      - name: Install SDL2
        run: brew install sdl2
      # zbgfx C/C++ is heavy; cache the global + project zig caches keyed on the zon.
      - name: Cache Zig artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            ~/Library/Caches/zig
            .zig-cache
          key: bgfx-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            bgfx-${{ runner.os }}-
      - name: Build + test
        run: zig build test

  # Integration: generate + cross-build the bgfx-android example (which now lives
  # here, not in labelle-assembler). Verifies the backend works end-to-end through
  # the toolkit. The example pins released core/engine/gfx (fetched) + this repo as
  # its backend (local:../..) + the assembler/cli as siblings (the flip + the
  # externalUsesEnumPath fix are unreleased, so build them from main). Build-only —
  # produces the aarch64 NativeActivity libgame.so; no device/emulator/APK.
  android-example:
    name: bgfx-android example .so cross-build
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout labelle-bgfx
        uses: actions/checkout@v4
        with:
          path: labelle-bgfx
          persist-credentials: false

      - name: Checkout labelle-assembler (main)
        uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-assembler
          ref: main
          path: labelle-assembler
          persist-credentials: false

      - name: Checkout labelle-cli (main)
        uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-cli
          ref: main
          path: labelle-cli
          persist-credentials: false

      - name: Checkout labelle-gui for the labelle-cli build
        uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-gui
          ref: main
          path: labelle-cli/zig-pkg/labelle-gui
          persist-credentials: false

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      # Cache the cross-compiled bgfx/bx/bimg C++ (the expensive part).
      - name: Cache Zig Android build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            labelle-bgfx/examples/bgfx-android/.labelle/bgfx_android/.zig-cache
          key: bgfx-android-${{ hashFiles('labelle-bgfx/examples/bgfx-android/project.labelle', 'labelle-bgfx/build.zig.zon') }}
          restore-keys: |
            bgfx-android-

      - name: Build labelle-assembler
        run: cd labelle-assembler && zig build

      - name: Build labelle-cli
        run: cd labelle-cli && zig build

      - name: Generate + cross-build libgame.so (aarch64-linux-android)
        env:
          LABELLE_ASSEMBLER: ${{ github.workspace }}/labelle-assembler/zig-out/bin/labelle-assembler
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cd labelle-bgfx/examples/bgfx-android
          $GITHUB_WORKSPACE/labelle-cli/zig-out/bin/labelle generate --platform=android
          cd .labelle/bgfx_android
          zig build

      - name: Verify libgame.so
        run: |
          set -euo pipefail
          so=$(find labelle-bgfx/examples/bgfx-android/.labelle/bgfx_android -name 'libgame.so' | head -1)
          if [ -z "$so" ]; then echo "libgame.so not found"; exit 1; fi
          echo "found: $so"
          file "$so"
          file "$so" | grep -q 'ELF 64-bit.*ARM aarch64' || { echo "FAIL: not an aarch64 ELF"; exit 1; }
          nm -D "$so" | grep -q 'android_main' || { echo "FAIL: android_main not exported"; exit 1; }
          nm -D "$so" | grep -q 'ANativeActivity_onCreate' || { echo "FAIL: ANativeActivity_onCreate not exported"; exit 1; }
