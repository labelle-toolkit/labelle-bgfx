name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: these jobs only read the repo (+ fetch public deps).
permissions:
  contents: read

jobs:
  build-test:
    name: bgfx backend build + test (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      # The shared SDL desktop gamepad source (labelle-sdl-gamepad) links SDL2.
      - name: Install SDL2
        run: brew install sdl2
      # zbgfx C/C++ is heavy; cache the global + project zig caches keyed on the zon.
      - name: Cache Zig artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            ~/Library/Caches/zig
            .zig-cache
          key: bgfx-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            bgfx-${{ runner.os }}-
      - name: Build + test
        run: zig build test
      # Material seam golden (labelle-gfx#305 Slice B, RFC §6): render the fixed
      # flash + palette_swap scene surfaceless (Metal offscreen FB — the
      # macos-latest Apple-Silicon runner has a Metal device + a GUI session) and
      # diff it against the committed golden TGA. Regenerate with
      # `zig build material-golden-bless` after an intentional shader change.
      - name: Material golden (flash + palette_swap)
        run: zig build material-golden
      # Post-fx seam golden (labelle-gfx#305 P2 Slice B, RFC §2.4 / §6): render the
      # fixed scene, run a bloom→crt stack through applyPostPass (render-target
      # ping-pong), composite onto the primary, and diff the surfaceless capture
      # against the committed golden TGA. Regenerate with
      # `zig build post-fx-golden-bless` after an intentional shader change.
      - name: Post-fx golden (bloom + crt)
        run: zig build post-fx-golden

  # Integration: generate + cross-build the bgfx-android example (which now lives
  # here, not in labelle-assembler). Verifies the backend works end-to-end through
  # the toolkit. The example pins released core/engine/gfx (fetched) + this repo as
  # its backend (local:../..) + the assembler/cli as siblings (the flip + the
  # externalUsesEnumPath fix are unreleased, so build them from main). Build-only —
  # produces the aarch64 NativeActivity libgame.so; no device/emulator/APK.
  android-example:
    name: bgfx-android example .so cross-build
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout labelle-bgfx
        uses: actions/checkout@v4
        with:
          path: labelle-bgfx
          persist-credentials: false

      - name: Checkout labelle-assembler (main)
        uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-assembler
          ref: main
          path: labelle-assembler
          persist-credentials: false

      - name: Checkout labelle-cli (main)
        uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-cli
          ref: main
          path: labelle-cli
          persist-credentials: false

      - name: Checkout labelle-gui for the labelle-cli build
        uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-gui
          ref: main
          path: labelle-cli/zig-pkg/labelle-gui
          persist-credentials: false

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      # Cache the cross-compiled bgfx/bx/bimg C++ (the expensive part).
      - name: Cache Zig Android build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            labelle-bgfx/examples/bgfx-android/.labelle/bgfx_android/.zig-cache
          key: bgfx-android-${{ hashFiles('labelle-bgfx/examples/bgfx-android/project.labelle', 'labelle-bgfx/build.zig.zon') }}
          restore-keys: |
            bgfx-android-

      - name: Build labelle-assembler
        run: cd labelle-assembler && zig build

      - name: Build labelle-cli
        run: cd labelle-cli && zig build

      - name: Generate + cross-build libgame.so (aarch64-linux-android)
        env:
          LABELLE_ASSEMBLER: ${{ github.workspace }}/labelle-assembler/zig-out/bin/labelle-assembler
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          cd labelle-bgfx/examples/bgfx-android
          $GITHUB_WORKSPACE/labelle-cli/zig-out/bin/labelle generate --platform=android
          cd .labelle/bgfx_android
          zig build

      - name: Verify libgame.so
        run: |
          set -euo pipefail
          so=$(find labelle-bgfx/examples/bgfx-android/.labelle/bgfx_android -name 'libgame.so' | head -1)
          if [ -z "$so" ]; then echo "libgame.so not found"; exit 1; fi
          echo "found: $so"
          file "$so"
          file "$so" | grep -q 'ELF 64-bit.*ARM aarch64' || { echo "FAIL: not an aarch64 ELF"; exit 1; }
          nm -D "$so" | grep -q 'android_main' || { echo "FAIL: android_main not exported"; exit 1; }
          nm -D "$so" | grep -q 'ANativeActivity_onCreate' || { echo "FAIL: ANativeActivity_onCreate not exported"; exit 1; }

  # Prove the surfaceless render + capture path (labelle-bgfx#36) works with NO
  # display server and NO real GPU — the exact CI scenario `labelle run
  # --headless --screenshot` targets. Runs the three on-demand probes on a bare
  # Ubuntu runner using Mesa **lavapipe** (a software Vulkan device) with DISPLAY
  # unset, and asserts each reports OK. `initHeadless` forces Vulkan, which
  # lavapipe provides headless (no VK_KHR_surface / swapchain needed).
  headless-linux:
    name: surfaceless probes (display-less, lavapipe)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      # Build deps: bgfx compiles all backends (its GL/X11 code links even when we
      # force Vulkan) and zglfw links X11; input links SDL2. Runtime: the Vulkan
      # loader + the lavapipe software ICD (mesa-vulkan-drivers). vulkan-tools is
      # just for the diagnostic below.
      - name: Install build + Vulkan (lavapipe) deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsdl2-dev \
            libgl1-mesa-dev libx11-dev libxext-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev \
            libwayland-dev libxkbcommon-dev \
            libvulkan-dev libvulkan1 mesa-vulkan-drivers vulkan-tools
      - name: Cache Zig artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: bgfx-headless-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            bgfx-headless-${{ runner.os }}-
      - name: Vulkan device summary (lavapipe expected, no display)
        env:
          DISPLAY: ""
        run: vulkaninfo --summary 2>/dev/null | grep -iE 'deviceName|driverName|apiVersion' || true
      - name: Run surfaceless probes with NO display server
        env:
          # Prove it's truly display-less: no X/Wayland available to fall back on.
          DISPLAY: ""
          WAYLAND_DISPLAY: ""
        run: |
          set -uo pipefail
          fail=0
          for step in headless-probe mirror-probe screenshot-probe; do
            echo "::group::$step"
            # No `set -e`, so a non-zero build/run doesn't abort the loop — but
            # capture the exit code and FOLD it into `fail` (a probe that printed
            # OK then crashed must still fail the job), alongside the OK-marker
            # check (which catches a build that produced no output at all).
            out=$(zig build "$step" 2>&1); rc=$?
            echo "$out"
            if [ "$rc" -ne 0 ]; then echo "FAIL: $step exited non-zero ($rc)"; fail=1; fi
            echo "$out" | grep -qE 'HEADLESS_OFFSCREEN_READBACK_OK|HEADLESS_MIRROR_OK|SCREENSHOT_TGA_OK' \
              || { echo "FAIL: $step did not report OK"; fail=1; }
            echo "::endgroup::"
          done
          exit $fail
